<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "AI Avengers Command Center" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body class="{% if nyra_active %}nyra-active{% endif %}">
  {% include 'components/navbar.html' %}
  <main class="container my-5">{% block content %}{% endblock %}</main>
  {% include 'components/footer.html' %}

  <audio id="nyraAudio" src="{{ url_for('static', filename='audio/nyra_chime.mp3') }}" preload="auto"></audio>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Theme + Nyra Script -->
  <script>
    const toggleBtn=document.getElementById("theme-toggle");
    const themeIcon=document.getElementById("theme-icon");
    const currentTheme=localStorage.getItem("theme")||"dark";
    document.body.dataset.theme=currentTheme;
    updateIcon(currentTheme);
    toggleBtn.addEventListener("click",()=>{
      const newTheme=document.body.dataset.theme==="dark"?"light":"dark";
      document.body.dataset.theme=newTheme;
      localStorage.setItem("theme",newTheme);
      updateIcon(newTheme);
    });
    function updateIcon(theme){
      themeIcon.className=theme==="dark"?"bi bi-brightness-high":"bi bi-moon";
    }

    // Nyra Chime
    const nyraActive={{ 'true' if nyra_active else 'false' }};
    if(nyraActive){
      const audio=document.getElementById('nyraAudio');
      window.addEventListener('DOMContentLoaded',()=>{
        setTimeout(()=>{
          audio.volume=0.35;
          audio.play().catch(()=>{});
        },600);
      });
    }
    <script>
      // ...existing code...
  const nyraActive = {{ nyra_active | tojson }};
      // ...existing code...
    </script>
