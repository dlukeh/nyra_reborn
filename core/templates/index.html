<!DOCTYPE html>

<head>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyra — Text Interface</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: auto;
            padding: 20px;
            background: #1c1c1c;
            border-radius: 10px;
        }
        h1 {
            text-align: center;
            color: #ff6ec7;
        }
        #response {
            white-space: pre-wrap;
            background: #000;
            padding: 15px;
            border-radius: 5px;
            min-height: 120px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        textarea, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            font-size: 16px;
            border-radius: 5px;
        }
        textarea {
            border: 1px solid #555;
            background: #222;
            color: #eee;
            resize: vertical;
            min-height: 60px;
        }
        button {
            background: #ff6ec7;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #ff89d6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Nyra — Text Interface</h1>

    <div id="response">Say something to Nyra…</div>

    <textarea id="user_input" placeholder="Type your message to Nyra here..." autofocus></textarea>
    <button onclick="sendText()">Send</button>
</div>

<script>
async function sendText() {
    const inputElem = document.getElementById("user_input");
    const responseElem = document.getElementById("response");
    const msg = inputElem.value.trim();
    if (!msg) {
        responseElem.textContent = "Error: No message entered.";
        inputElem.focus();
        return;
    }

    responseElem.textContent = "Waiting for Nyra...";
    try {
        const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: msg })
        });
        const data = await res.json();

        // Custom handling for Gemini API quota errors
        if (data.error && data.error.includes("quota")) {
            responseElem.textContent = "Nyra's AI engine has reached its daily usage limit. Please wait for the quota to reset or upgrade your Gemini API plan.";
        } else if (!res.ok) {
            responseElem.textContent = data.error || "Error: Server returned an error.";
        } else if (data.response) {
            responseElem.textContent = data.response;
        } else {
            responseElem.textContent = "No response from Nyra.";
        }
    } catch (err) {
        responseElem.textContent = "Network Error.";
    }
    inputElem.value = "";
    inputElem.focus();
}
</script>

</body>
</html>
